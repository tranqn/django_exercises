{% extends "base.html" %}

{% block title %}{{ view.title|default:"Book Form" }}{% endblock %}

{% block content %}
<h1>{% if object %}Edit{% else %}Create{% endif %} Book</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
    <a href="{% url 'book-list' %}">Cancel</a>
</form>
{% endblock %}
