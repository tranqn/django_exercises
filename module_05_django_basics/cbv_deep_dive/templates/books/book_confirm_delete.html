{% extends "base.html" %}

{% block title %}Delete Book{% endblock %}

{% block content %}
<h1>Delete Book</h1>
<p>Are you sure you want to delete "<strong>{{ object.title }}</strong>"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-danger">Yes, delete</button>
    <a href="{% url 'book-list' %}">Cancel</a>
</form>
{% endblock %}
